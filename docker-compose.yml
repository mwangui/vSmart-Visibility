# Plan §19.4: one-command demo. Compose v2 syntax (no version key required).
#
# Hardening per codeguard-0-devops-ci-cd-containers:
# - non-root users (set in Dockerfiles)
# - no_new_privileges
# - cap_drop: ALL
# - read-only root filesystem with explicit tmpfs / volume writes
# - resource limits
# - never mount /var/run/docker.sock

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: vsmart/backend:dev
    env_file:
      - ./backend/.env
    environment:
      RAG_DOC_DIR: /rag-doc
      DATABASE_URL: sqlite+aiosqlite:////app/data/app.sqlite
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./RAG-Doc:/rag-doc:ro
      - backend_data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: vsmart/frontend:dev
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:80"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    restart: unless-stopped

volumes:
  backend_data:
